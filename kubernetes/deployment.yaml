apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-troubleshooting-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-bot
  template:
    metadata:
      labels:
        app: ai-bot
    spec:
      containers:
      - name: ai-bot
        image: k8s-ai-bot:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
